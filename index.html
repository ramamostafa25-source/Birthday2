<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Roro ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
direction: rtl;
background:linear-gradient(135deg,#fff0f6,#ffdeeb,#ffc2d1);
color:#cb3473;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* Floating Hearts */

.heart{
position:fixed;
bottom:-40px;
font-size:20px;
color:#ff5ea9;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:70px;
color:#cb3473;
text-shadow:0 0 15px rgba(203,52,115,0.3);
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#ff5ea9;
}

/* INFO SECTION */

.info{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
padding:80px 10%;
text-align:center;
}

.card{
background:rgba(255,255,255,0.4);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(203,52,115,.2);
width:260px;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card h2{
font-family:'Great Vibes',cursive;
font-size:34px;
color:#cb3473;
margin-bottom:10px;
}

/* HER SECTION */

.her{
text-align:center;
padding:80px 10%;
}

.her img{
width:260px;
border-radius:20px;
box-shadow:0 0 30px rgba(203,52,115,.3);
margin-top:30px;
}

/* GALLERY */

.gallery{
padding:80px 10%;
}

.gallery h2{
text-align:center;
font-family:'Great Vibes',cursive;
font-size:48px;
margin-bottom:40px;
color:#cb3473;
}

.photos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

.photos img{
width:100%;
border-radius:15px;
transition:.4s;
box-shadow:0 10px 20px rgba(203,52,115,.2);
}

.photos img:hover{
transform:scale(1.05);
}

/* Footer */

footer{
text-align:center;
padding:40px;
color:#cb3473;
}

/* VIDEO SECTION */

.video-section {
text-align: center;
padding: 80px 10%;
}

.video-section h2 {
font-family: 'Great Vibes', cursive;
font-size: 48px;
color: #cb3473;
margin-bottom: 30px;
}

.video-container {
max-width: 800px;
margin: auto;
border-radius: 20px;
overflow: hidden;
box-shadow: 0 10px 30px rgba(203,52,115,.3);
border: 5px solid rgba(255,255,255,0.4);
background: rgba(255,255,255,0.2);
backdrop-filter: blur(5px);
}

video {
width: 100%;
display: block;
}

/* Mobile */

@media(max-width:768px){

.hero h1{
font-size:42px;
color:#cb3473;
}

}

</style>
</head>

<body>

<div id="main-content">

<section class="hero" id="welcome-container">
<h1>كل سنه وانت طيبة يا Roro 🎉</h1>
<p>You are the most beautiful part of my life ( Rama )</p>
</section>

<!-- IMPORTANT DATES -->

<section class="info">

<div class="card">
<h2>Your Birthday</h2>
<p>4/4/2009</p>
</div>

</section>



<!-- VIDEO SECTION -->
<section class="video-section">
<h2>Song to you</h2>
<div class="video-container">
  <video controls>
    <source src="vid.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>
</section>

<!-- GALLERY -->

<section class="gallery">

<h2>The Girl Who Owns My Heart</h2>

<div class="photos">

<img src="rere.jpeg">
<img src="rere2.jpeg">
<img src="rere3.jpeg">
<img src="rere7.jpeg">

</div>

</section>

<footer>

Made with 💖 just for you

</footer>

</div>
<script>

function hearts(){
const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*25)+"px"
heart.style.animationDuration=(5+Math.random()*5)+"s"
document.body.appendChild(heart)
setTimeout(()=>{
heart.remove()
},8000)
}
setInterval(hearts,400)
</script>

</body>
</html>
